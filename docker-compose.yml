services:
  mysql:
    image: mysql:8.0
    container_name: spotify-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: spotify_db
      MYSQL_USER: spotify_user
      MYSQL_PASSWORD: spotify_pass
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: spotify-backend
    ports:
      - "3000:3000"
    environment:
      DB_HOST: mysql
      DB_USER: spotify_user
      DB_PASSWORD: spotify_pass
      DB_NAME: spotify_db
      CORS_ORIGIN: http://localhost:5173
    volumes:
      - ./backend/audio:/app/audio
      - ./backend/src:/app/src
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend-next
      dockerfile: Dockerfile
    container_name: spotify-frontend
    ports:
      - "5173:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend-next/app:/app/app
      - ./frontend-next/lib:/app/lib
      - ./frontend-next/public:/app/public
      - ./frontend-next/components:/app/components
      - ./frontend-next/context:/app/context
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mysql_data:
